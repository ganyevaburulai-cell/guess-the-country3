<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Угадай страну </title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f3b2c, #062010);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* главный контейнер */
        .game-wrapper {
            max-width: 950px;
            width: 100%;
            background: #fef5e6;
            border-radius: 70px 50px 70px 50px;
            box-shadow: 0 30px 35px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* шапка */
        .game-header {
            background: #ffc97a;
            padding: 20px 25px;
            text-align: center;
            border-bottom: 5px solid #b55a1a;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            color: #2c2b1f;
        }

        .mode-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: #2c6e46;
            border: none;
            padding: 8px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 0 #1a452c;
        }

        .mode-btn.active {
            background: #e68a2e;
            box-shadow: 0 4px 0 #a55112;
            transform: translateY(-1px);
        }

        /* панель управления */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e9dbbc;
            padding: 10px 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .home-btn {
            background: #a55313;
            border: none;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.1s;
        }

        .team-config {
            background: #c7a86b;
            padding: 6px 15px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .team-config label {
            font-weight: bold;
            color: #2e241a;
        }

        #teamCountInput {
            width: 70px;
            padding: 6px;
            border-radius: 30px;
            border: none;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .apply-teams {
            background: #2c6e46;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        /* основная зона игры */
        .quiz-area {
            padding: 25px 25px 30px;
        }

        .symbols-box {
            background: #f7eedb;
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            font-size: 3.5rem;
            letter-spacing: 14px;
            border: 3px dashed #ffae5a;
            margin-bottom: 20px;
            word-break: break-word;
        }

        .question {
            font-size: 1.7rem;
            font-weight: bold;
            text-align: center;
            background: #f3e5c0;
            padding: 10px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #answerInput {
            flex: 4;
            padding: 14px 20px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: 2px solid #c29a4a;
            background: #fffdf5;
            outline: none;
        }

        #guessBtn {
            flex: 1;
            background: #ff7e33;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 4px 0 #b3490c;
        }

        .hint-block {
            background: #e3d4b5;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .hint-text {
            font-style: italic;
            color: #3f2f1a;
        }

        #hintBtn {
            background: #587b4f;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .status {
            background: #ddce9f;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* командная панель (динамические команды) */
        .teams-board {
            background: #2c5a3b;
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .teams-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .team-card {
            background: #f9e5b3;
            border-radius: 60px;
            padding: 8px 18px;
            min-width: 130px;
            text-align: center;
            font-weight: bold;
            transition: 0.1s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .team-card.active-team {
            background: #ffb347;
            color: #2c1c0a;
            box-shadow: 0 0 0 3px gold, 0 0 0 6px #ffdd88;
            transform: scale(1.02);
        }

        .team-name {
            font-size: 1.2rem;
        }

        .team-score {
            font-size: 1.4rem;
            font-weight: bold;
            background: #00000055;
            border-radius: 30px;
            padding: 0 8px;
            display: inline-block;
            margin-left: 8px;
        }

        .timer-panel {
            text-align: center;
            background: #2b2b1a;
            color: #ffde9c;
            padding: 6px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .single-score-board {
            background: #2a593a;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            color: #ffefcf;
            font-weight: bold;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .next-btn {
            width: 100%;
            background: #3e7a54;
            border: none;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.1s;
        }

        .hidden {
            display: none;
        }

        button {
            cursor: pointer;
        }

        @media (max-width: 650px) {
            .symbols-box { font-size: 2.3rem; letter-spacing: 6px; }
            .team-card { min-width: 100px; padding: 5px 12px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <div class="game-header">
        <h1>🌏 УГАДАЙ СТРАНУ 🧩</h1>
        <div class="mode-bar">
            <button class="mode-btn" data-mode="single">👤 Одиночная</button>
            <button class="mode-btn" data-mode="team">👥 Командная </button>
        </div>
    </div>

    <!-- ЭКРАН СТАРТА (ГЛАВНАЯ) -->
    <div id="mainMenuScreen" class="quiz-area">
        <div style="text-align: center; padding: 20px;">
            <div style="background: #ffefcf; border-radius: 60px; padding: 25px;">
                <p style="font-size: 1.8rem;">🎮 Добро пожаловать!</p>
                <p>Выберите режим игры выше, настройте кол-во команд (для командного режима)<br>
                и нажмите СТАРТ</p>
                <button id="globalStartBtn" style="background:#ff9f4a; font-size:2rem; padding:15px 40px; border-radius:60px; border:none; font-weight:bold; margin:20px 0; box-shadow:0 8px 0 #944e18;">🚀 СТАРТ ИГРЫ</button>
                <p>⭐ Подсказки, яркие символы — угадайте страну!</p>
            </div>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="gamePlayScreen" class="hidden">
        <div class="top-actions">
            <button id="exitToMainBtn" class="home-btn">🏠 На главную</button>
            <div class="team-config" id="teamConfigPanel">
                <label>👥 Кол-во команд:</label>
                <input type="number" id="teamCountInput" min="2" max="8" value="3">
                <button id="applyTeamsBtn" class="apply-teams">✅ Применить</button>
            </div>
        </div>
        <div class="quiz-area">
            <div class="symbols-box" id="symbolsDisplay">🏔️ 🦘 🌊</div>
            <div class="question">Какая страна скрывается?</div>
            <div class="input-group">
                <input type="text" id="answerInput" placeholder="Введите название страны..." autocomplete="off">
                <button id="guessBtn">🔍 Ответить</button>
            </div>
            <div class="hint-block">
                <span class="hint-text" id="hintMessage">💡 Нажмите на подсказку</span>
                <button id="hintBtn">📖 Подсказка</button>
            </div>
            <div class="status" id="statusMsg">✨ Готовность</div>

            <!-- Панель одиночного режима -->
            <div id="singlePanel" class="single-score-board hidden">
                <span>🏆 Очки: <span id="singleScore">0</span></span>
                <span>✅ Правильных ответов: <span id="correctCount">0</span></span>
            </div>

            <!-- Динамическая командная панель -->
            <div id="teamPanel" class="teams-board hidden">
                <div class="teams-container" id="teamsContainer"></div>
                <div class="timer-panel" id="timerDisplayTeam">⏱️ Время: 00:45</div>
            </div>

            <button id="nextCountryBtn" class="next-btn">➡️ Следующая страна</button>
        </div>
    </div>
</div>

<script>
    // ---------- БАЗА СТРАН (символы + подсказки) ----------
    const COUNTRIES = [
        { name: "Япония", symbols: "🗻 🍣 🎌 🤖", hint: "Страна восходящего солнца, аниме и сакура." },
        { name: "Франция", symbols: "🥖 🧀 🗼 🎨", hint: "Эйфелева башня, круассаны и Лувр." },
        { name: "Италия", symbols: "🍕 🍝 🏛️ 🎭", hint: "Колизей, паста и пицца." },
        { name: "Египет", symbols: "🐪 🏜️ 🔺 🧿", hint: "Пирамиды, фараоны и Сфинкс." },
        { name: "Бразилия", symbols: "⚽ 🏖️ 🎉 🦜", hint: "Самба, футбол и карнавал в Рио." },
        { name: "Индия", symbols: "🐘 🕌 🍛 🕉️", hint: "Болливуд, йога и Тадж-Махал." },
        { name: "Австралия", symbols: "🦘 🏄‍♂️ ☀️ 🐨", hint: "Кенгуру, коалы и Большой Барьерный риф." },
        { name: "Канада", symbols: "🍁 🦌 ❄️ 🏒", hint: "Кленовый лист, хоккей и лоси." },
        { name: "Мексика", symbols: "🌮 🎸 💀 🌵", hint: "Кактусы, текила и День мёртвых." },
        { name: "Великобритания", symbols: "🎩 ☕ 🕰️ 👑", hint: "Биг-Бен, Лондон и королевская семья." },
        { name: "Египет", symbols: "🐪 🏜️ 🔺 🧿", hint: "Пирамиды, фараоны." },
        { name: "Турция", symbols: "🥙 🕌 ☕ 🧿", hint: "Стамбул, кебаб и памуккале." }
    ].filter((v,i,a)=>a.findIndex(t=>t.name===v.name)===i); // убираем дубликат Египта

    let gameMode = "single";      // single / team
    let isGameActive = false;
    let currentCountryIndex = 0;
    let currentCountry = null;
    let hintUsed = false;

    // Одиночные очки
    let singlePoints = 0;
    let singleCorrect = 0;

    // Командные переменные
    let teamsCount = 3;              // по умолчанию 3 команды
    let teamScores = [];
    let activeTeam = 0;
    let timerInterval = null;
    let timeLimit = 45;              // увеличенное время команд (45 секунд)
    let timeLeft = timeLimit;
    let isWaitingNext = false;       // после ответа нужно нажать "следующая"

    // DOM элементы
    const mainMenu = document.getElementById('mainMenuScreen');
    const gamePlay = document.getElementById('gamePlayScreen');
    const globalStartBtn = document.getElementById('globalStartBtn');
    const exitToMainBtn = document.getElementById('exitToMainBtn');
    const symbolsDisplay = document.getElementById('symbolsDisplay');
    const answerInput = document.getElementById('answerInput');
    const guessBtn = document.getElementById('guessBtn');
    const hintBtn = document.getElementById('hintBtn');
    const hintMessageSpan = document.getElementById('hintMessage');
    const statusMsgSpan = document.getElementById('statusMsg');
    const nextBtn = document.getElementById('nextCountryBtn');
    const singlePanelDiv = document.getElementById('singlePanel');
    const teamPanelDiv = document.getElementById('teamPanel');
    const teamsContainer = document.getElementById('teamsContainer');
    const timerDisplayTeam = document.getElementById('timerDisplayTeam');
    const singleScoreSpan = document.getElementById('singleScore');
    const correctCountSpan = document.getElementById('correctCount');
    const teamCountInput = document.getElementById('teamCountInput');
    const applyTeamsBtn = document.getElementById('applyTeamsBtn');

    // Кнопки выбора режима
    const modeBtns = document.querySelectorAll('.mode-btn');

    // ---- Инициализация команд ----
    function initTeams(count) {
        teamsCount = Math.min(8, Math.max(2, count));
        teamScores = new Array(teamsCount).fill(0);
        activeTeam = 0;
        renderTeamUI();
    }

    function renderTeamUI() {
        if (!teamsContainer) return;
        teamsContainer.innerHTML = '';
        for (let i = 0; i < teamScores.length; i++) {
            const card = document.createElement('div');
            card.classList.add('team-card');
            if (activeTeam === i) card.classList.add('active-team');
            card.innerHTML = `<div class="team-name">Команда ${i+1}</div>
                              <div class="team-score">${teamScores[i]} 🏅</div>`;
            // клик для смены активной команды (можно для админа)
            card.addEventListener('click', (e) => {
                if (!isGameActive || gameMode !== "team") return;
                if (isWaitingNext) { statusMsgSpan.innerText = "Сначала нажми 'Следующая страна'"; return; }
                if (timerInterval) clearInterval(timerInterval);
                activeTeam = i;
                renderTeamUI();
                startTeamTimer();
                statusMsgSpan.innerText = `🔄 Ход передан команде ${activeTeam+1} (вручную)`;
            });
            teamsContainer.appendChild(card);
        }
    }

    function updateTeamScoresUI() {
        const cards = document.querySelectorAll('.team-card');
        for (let i = 0; i < teamScores.length; i++) {
            if (cards[i]) {
                const scoreSpan = cards[i].querySelector('.team-score');
                if (scoreSpan) scoreSpan.innerText = `${teamScores[i]} 🏅`;
                if (activeTeam === i) cards[i].classList.add('active-team');
                else cards[i].classList.remove('active-team');
            }
        }
    }

    // Таймер командный (увеличенное время 45 сек)
    function stopTeamTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTeamTimer() {
        if (gameMode !== "team" || !isGameActive) return;
        stopTeamTimer();
        timeLeft = timeLimit;
        updateTimerUI();
        timerInterval = setInterval(() => {
            if (!isGameActive || gameMode !== "team" || isWaitingNext) return;
            if (timeLeft <= 1) {
                // время вышло
                stopTeamTimer();
                if (!isWaitingNext) {
                    statusMsgSpan.innerText = `⏰ Время вышло! Команда ${activeTeam+1} не угадала. Ход переходит.`;
                    // смена команды без очков
                    activeTeam = (activeTeam + 1) % teamScores.length;
                    renderTeamUI();
                    // загружаем ту же страницу для новой команды
                    hintUsed = false;
                    hintMessageSpan.innerText = "💡 Новая подсказка";
                    answerInput.value = '';
                    answerInput.disabled = false;
                    guessBtn.disabled = false;
                    isWaitingNext = false;
                    loadCountry(currentCountryIndex);
                    startTeamTimer();
                }
            } else {
                timeLeft--;
                updateTimerUI();
            }
        }, 1000);
    }

    function updateTimerUI() {
        if (timerDisplayTeam) {
            let sec = timeLeft;
            let mins = Math.floor(sec / 60);
            let remainSec = sec % 60;
            timerDisplayTeam.innerText = `⏱️ Время: ${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
        }
    }

    // Загрузка страны
    function loadCountry(index) {
        if (!COUNTRIES[index]) index = 0;
        currentCountryIndex = index;
        currentCountry = COUNTRIES[currentCountryIndex];
        symbolsDisplay.innerHTML = currentCountry.symbols.split(' ').map(s => `<span>${s}</span>`).join('');
        answerInput.value = '';
        hintUsed = false;
        hintMessageSpan.innerText = "💡 Нажмите для подсказки";
        if (gameMode === "team") {
            statusMsgSpan.innerText = `Команда ${activeTeam+1}, угадайте страну! Осталось ${timeLeft} сек.`;
        } else {
            statusMsgSpan.innerText = "Угадайте страну по символам!";
        }
        isWaitingNext = false;
        answerInput.disabled = false;
        guessBtn.disabled = false;
    }

    // Ответ
    function checkAnswer() {
        if (!isGameActive) {
            statusMsgSpan.innerText = "❌ Игра не активна, вернитесь в главное меню и нажмите СТАРТ.";
            return;
        }
        if (isWaitingNext) {
            statusMsgSpan.innerText = "🔁 Уже отвечено! Нажмите 'Следующая страна'.";
            return;
        }
        const userAns = answerInput.value.trim().toLowerCase();
        if (userAns === "") {
            statusMsgSpan.innerText = "Введите название страны!";
            return;
        }
        const correctName = currentCountry.name.toLowerCase();
        let isCorrect = (userAns === correctName);
        // синонимы
        if (!isCorrect && userAns === "сша" && currentCountry.name === "Соединенные Штаты") isCorrect = false;
        if (!isCorrect && userAns === "россия" && currentCountry.name === "Россия") isCorrect = false;
        
        if (isCorrect) {
            // Правильно!
            if (gameMode === "single") {
                singlePoints += 10;
                singleCorrect++;
                singleScoreSpan.innerText = singlePoints;
                correctCountSpan.innerText = singleCorrect;
                statusMsgSpan.innerText = `✅ Верно! +10 очков. Это ${currentCountry.name}. Нажмите "Следующая страна".`;
                isWaitingNext = true;
                answerInput.disabled = true;
                guessBtn.disabled = true;
            } else {
                // командный режим
                teamScores[activeTeam] += 10;
                updateTeamScoresUI();
                statusMsgSpan.innerText = `🎉 Команда ${activeTeam+1} угадала! +10 очков! Страна: ${currentCountry.name}. Ход переходит.`;
                stopTeamTimer();
                // смена команды
                activeTeam = (activeTeam + 1) % teamScores.length;
                renderTeamUI();
                isWaitingNext = true;
                answerInput.disabled = true;
                guessBtn.disabled = true;
                statusMsgSpan.innerText += ` Теперь ход команды ${activeTeam+1}. Нажмите "Следующая страна".`;
            }
        } else {
            // Неправильно
            if (gameMode === "single") {
                statusMsgSpan.innerText = `❌ Неверно! Правильный ответ: ${currentCountry.name}. Переход к следующей стране.`;
                isWaitingNext = true;
                answerInput.disabled = true;
                guessBtn.disabled = true;
            } else {
                statusMsgSpan.innerText = `❌ Команда ${activeTeam+1} ошиблась! Правильно: ${currentCountry.name}. Ход переходит.`;
                stopTeamTimer();
                activeTeam = (activeTeam + 1) % teamScores.length;
                renderTeamUI();
                // сброс подсказки и загрузка той же страны для новой команды
                hintUsed = false;
                hintMessageSpan.innerText = "💡 Подсказка доступна";
                answerInput.value = '';
                answerInput.disabled = false;
                guessBtn.disabled = false;
                isWaitingNext = false;
                loadCountry(currentCountryIndex);
                startTeamTimer();
                return;
            }
        }
        if (gameMode === "team" && isCorrect) {
            // после правильного ответа не загружаем страну сразу, ждём next
            return;
        }
    }

    function showHint() {
        if (!isGameActive) { statusMsgSpan.innerText = "Игра не запущена"; return; }
        if (isWaitingNext) { statusMsgSpan.innerText = "Откройте следующую страну для подсказки"; return; }
        if (!hintUsed) {
            hintMessageSpan.innerText = `📌 ${currentCountry.hint}`;
            hintUsed = true;
            statusMsgSpan.innerText = "🔎 Подсказка показана!";
        } else {
            hintMessageSpan.innerText = `🔁 Подсказка: ${currentCountry.hint}`;
        }
    }

    function nextCountryHandler() {
        if (!isGameActive) { statusMsgSpan.innerText = "Игра не активна, нажмите СТАРТ в меню"; return; }
        if (!isWaitingNext) {
            statusMsgSpan.innerText = "⚠️ Сначала дайте ответ на текущую страну!";
            return;
        }
        // Переход к следующей стране
        let nextIdx = (currentCountryIndex + 1) % COUNTRIES.length;
        currentCountryIndex = nextIdx;
        isWaitingNext = false;
        hintUsed = false;
        hintMessageSpan.innerText = "💡 Новая подсказка";
        answerInput.disabled = false;
        guessBtn.disabled = false;
        loadCountry(currentCountryIndex);
        if (gameMode === "team") {
            // запускаем таймер для активной команды
            startTeamTimer();
            statusMsgSpan.innerText = `Новая страна! Ход команды ${activeTeam+1}`;
        } else {
            statusMsgSpan.innerText = "Новая страна! Угадайте!";
        }
    }

    // Полный сброс и старт игры
    function startGame() {
        // сохраняем выбранный режим и кол-во команд
        if (gameMode === "team") {
            let newCount = parseInt(teamCountInput.value);
            if (isNaN(newCount)) newCount = 3;
            newCount = Math.min(8, Math.max(2, newCount));
            teamsCount = newCount;
            initTeams(teamsCount);
        }
        // сброс одиночной статистики
        singlePoints = 0;
        singleCorrect = 0;
        singleScoreSpan.innerText = "0";
        correctCountSpan.innerText = "0";
        currentCountryIndex = 0;
        isWaitingNext = false;
        hintUsed = false;
        isGameActive = true;
        
        // Показать нужную панель
        if (gameMode === "single") {
            singlePanelDiv.classList.remove("hidden");
            teamPanelDiv.classList.add("hidden");
        } else {
            singlePanelDiv.classList.add("hidden");
            teamPanelDiv.classList.remove("hidden");
            stopTeamTimer();
            activeTeam = 0;
            renderTeamUI();
            startTeamTimer();
        }
        loadCountry(0);
        mainMenu.classList.add("hidden");
        gamePlay.classList.remove("hidden");
    }

    function exitToMain() {
        isGameActive = false;
        stopTeamTimer();
        mainMenu.classList.remove("hidden");
        gamePlay.classList.add("hidden");
        statusMsgSpan.innerText = "Возврат в главное меню";
    }

    // Применить количество команд в реальном времени (если не в игре)
    applyTeamsBtn.addEventListener("click", () => {
        if (isGameActive && !mainMenu.classList.contains("hidden")===false) {
            statusMsgSpan.innerText = "Нельзя менять команды во время игры. Вернитесь на главную.";
            return;
        }
        let val = parseInt(teamCountInput.value);
        if (isNaN(val)) val = 3;
        val = Math.min(8, Math.max(2, val));
        teamsCount = val;
        teamCountInput.value = val;
        initTeams(teamsCount);
        statusMsgSpan.innerText = `✅ Команд установлено: ${teamsCount}`;
    });

    // Режимы
    modeBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            if (isGameActive && !mainMenu.classList.contains("hidden")) {
                // не в игре
            }
            const mode = btn.dataset.mode;
            gameMode = mode;
            modeBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (mode === "team") {
                document.getElementById('teamConfigPanel').style.display = "flex";
            } else {
                document.getElementById('teamConfigPanel').style.display = "flex";
            }
        });
    });

    // Старт с главного меню
    globalStartBtn.addEventListener("click", () => {
        startGame();
    });
    exitToMainBtn.addEventListener("click", exitToMain);
    guessBtn.addEventListener("click", checkAnswer);
    hintBtn.addEventListener("click", showHint);
    nextBtn.addEventListener("click", nextCountryHandler);
    answerInput.addEventListener("keypress", (e) => { if(e.key === "Enter") checkAnswer(); });
    
    // начальные значения
    initTeams(3);
    teamCountInput.value = 3;
    document.querySelector('[data-mode="single"]').classList.add("active");
    gameMode = "single";
    document.getElementById('teamConfigPanel').style.display = "flex";
</script>
</body>
</html>
